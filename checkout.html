<!DOCTYPE html>
<html>
    <head>
        <title>Checkout - Sutrehouse</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="stylesheet.css">
    </head>
    <body>
        <header class="site-header">
            <a href="index.html"><img src="sutre.jpg" class="logo" alt="SutreHouse logo"></a>
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="clothing.html">Clothing</a>
                <a href="bags.html">Bags</a>
                <a href="accessories.html">Accessories</a>
                <a href="collaborations.html">Collaborations</a>
            </nav>
        </header>

        <main>
        <section class="page-hero">
                <span class="eyebrow">Checkout</span>
                <h1>Your Cart</h1>
                <p>Review your items and proceed to payment.</p>

                <div id="cart-container"></div>

                <h2>Total: £<span id="total">0.00</span></h2>
                <input
    type="email"
    id="customer-email"
    placeholder="Enter your email"
    required
    style="padding:10px;width:100%;margin:10px 0;"
>
                <button class="checkout-btn" id="pay-btn">
                Pay Securely with SumUp
                </button>
      </section>
        </main>

<!-- 👇 THIS IS WHERE YOUR SCRIPT GOES -->
<script>

// Load cart safely
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

// Ensure quantity exists
cart = cart.map(item => ({
    ...item,
    quantity: item.quantity || 1
}));

function saveCart() {
    localStorage.setItem("cart", JSON.stringify(cart));
}

function updateCartCount() {
    const totalItems = cart.reduce((sum, item) => {
        return sum + (item.quantity || 1);
    }, 0);

    const el = document.getElementById("cart-count");
    if (el) el.textContent = totalItems;
}

function renderCart() {
    const container = document.getElementById("cart-container");
    const totalElement = document.getElementById("total");

    container.innerHTML = "";

    let total = 0;

    if (cart.length === 0) {
        container.innerHTML = "<p>Your cart is empty.</p>";
        totalElement.textContent = "0.00";
        return;
    }

    cart.forEach((item, index) => {
        total += item.price * item.quantity;

        const div = document.createElement("div");
        div.innerHTML = `
            <strong>${item.name}</strong><br>
            Size: ${item.size}<br>
            Fit: ${item.fit}<br>
            Color: ${item.color || "N/A"}<br>
            £${item.price}<br>

            <button onclick="decreaseQty(${index})">-</button>
            <span>${item.quantity}</span>
            <button onclick="increaseQty(${index})">+</button>
            <button onclick="removeItem(${index})">Remove</button>
            <hr>
        `;
        container.appendChild(div);
    });

    totalElement.textContent = total.toFixed(2);

    saveCart();
    updateCartCount();
}

function increaseQty(i) {
    cart[i].quantity++;
    saveCart();
    renderCart();
}

function decreaseQty(i) {
    if (cart[i].quantity > 1) {
        cart[i].quantity--;
    } else {
        cart.splice(i, 1);
    }

    saveCart();
    renderCart();
}

function removeItem(i) {
    cart.splice(i, 1);
    saveCart();
    renderCart();
}

// Checkout button
document.getElementById("pay-btn").addEventListener("click", async () => {

    const customerEmail = document.getElementById("customer-email").value.trim();

    if (!customerEmail) {
        alert("Please enter your email address.");
        return;
    }

    if (cart.length === 0) {
        alert("Your cart is empty.");
        return;
    }

    const total = cart.reduce((sum, item) =>
        sum + item.price * item.quantity, 0
    );

    try {

        const res = await fetch("http://localhost:3000/create-checkout", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                amount: total,
                description: "Sutre House Order",
                items: cart,
                customerEmail
            })
        });

        if (!res.ok) {
            alert("Checkout failed. Try again.");
            return;
        }

        const data = await res.json();

        console.log("BACKEND RESPONSE:", data);

        if (!data.url) {
            alert("Checkout failed. Try again.");
            return;
        }

        window.location.href = data.url;

    } catch (err) {
        console.error(err);
        alert("Server error. Please try again later.");
    }
});

renderCart();

</script>

</body>
</html>
