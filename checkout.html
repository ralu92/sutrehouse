<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout - Sutrehouse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesheet.css">
    <style>
        .error-message { color: #d9534f; background: #f2dede; padding: 10px; border-radius: 4px; margin: 10px 0; display: none; }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; margin-right: 10px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .checkout-btn:disabled { opacity: 0.7; cursor: not-allowed; }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="index.html"><img src="sutre.jpg" class="logo" alt="SutreHouse logo"></a>
        <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="clothing.html">Clothing</a>
            <a href="bags.html">Bags</a>
            <a href="accessories.html">Accessories</a>
            <a href="collaborations.html">Collaborations</a>
        </nav>
    </header>

    <main>
        <section class="page-hero">
            <span class="eyebrow">Checkout</span>
            <h1>Your Cart</h1>
            <p>Review your items and proceed to payment.</p>

            <div id="error-box" class="error-message"></div>
            <div id="cart-container"></div>

            <div style="max-width: 400px; margin: 20px auto; border: 1px solid #ddd; padding: 15px; border-radius: 8px; text-align: left;">
                <label for="promoCode" style="font-weight: bold; display: block; margin-bottom: 5px;">Promo Code</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="promoCode" placeholder="Enter code" style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                    <button id="apply-promo-btn" style="padding: 10px 20px; background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer;">Apply</button>
                </div>
                <p id="promo-message" style="margin-top: 10px; font-size: 0.9em; display: none;"></p>
            </div>

            <div id="discount-display" style="display: none; color: #4CAF50; font-weight: bold; margin-bottom: 10px;">
                Discount: -£<span id="discount-amount">0.00</span>
            </div>

            <h2>Total: £<span id="total">0.00</span></h2>

            <div style="max-width: 400px; margin: 0 auto; text-align: left;">
                <label for="customerName">Full Name</label>
                <input type="text" id="customerName" placeholder="Enter your full name" required style="padding:10px;width:100%;margin:10px 0;box-sizing:border-box;">

                <label for="customer-email">Email Address</label>
                <input type="email" id="customer-email" placeholder="Enter your email" required style="padding:10px;width:100%;margin:10px 0;box-sizing:border-box;">

                <button class="checkout-btn" id="pay-btn" style="width:100%;padding:15px;background:#333;color:#fff;border:none;border-radius:5px;cursor:pointer;font-weight:bold;margin-top:20px;">
                    Pay Securely with SumUp
                </button>
            </div>
        </section>
    </main>

    <script>
        const BACKEND_URL = "https://sutrehouse-backend.onrender.com";

        let cart = JSON.parse(localStorage.getItem("cart") || "[]");
        let appliedPromo = null;
        cart = cart.map(item => ({ ...item, quantity: item.quantity || 1 }));

        function saveCart() {
            localStorage.setItem("cart", JSON.stringify(cart));
        }

        // Returns the final discounted total as a number
        function calcFinalTotal() {
            const raw = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
            if (!appliedPromo) return raw;
            if (appliedPromo.type === "PERCENT") {
                return Math.max(0, raw - (raw * appliedPromo.value) / 100);
            }
            if (appliedPromo.type === "FIXED") {
                return Math.max(0, raw - appliedPromo.value);
            }
            return raw;
        }

        function renderCart() {
            const container = document.getElementById("cart-container");
            const totalElement = document.getElementById("total");

            container.innerHTML = "";

            if (cart.length === 0) {
                container.innerHTML = "<p>Your cart is empty.</p>";
                totalElement.textContent = "0.00";
                document.getElementById("pay-btn").disabled = true;
                return;
            }

            document.getElementById("pay-btn").disabled = false;

            const rawTotal = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);

            cart.forEach((item, index) => {
                const div = document.createElement("div");
                div.style.borderBottom = "1px solid #eee";
                div.style.padding = "10px 0";
                div.innerHTML = `
                    <strong>${item.name}</strong> (Size: ${item.size}, Fit: ${item.fit})<br>
                    £${item.price.toFixed(2)} x ${item.quantity}
                    <div style="margin-top: 5px;">
                        <button onclick="changeQty(${index}, -1)">-</button>
                        <span style="margin: 0 10px;">${item.quantity}</span>
                        <button onclick="changeQty(${index}, 1)">+</button>
                        <button onclick="removeItem(${index})" style="margin-left:20px;color:red;border:none;background:none;cursor:pointer;">Remove</button>
                    </div>
                `;
                container.appendChild(div);
            });

            if (appliedPromo) {
                let discount = 0;
                if (appliedPromo.type === "PERCENT") {
                    discount = (rawTotal * appliedPromo.value) / 100;
                } else if (appliedPromo.type === "FIXED") {
                    discount = Math.min(appliedPromo.value, rawTotal);
                }
                document.getElementById("discount-amount").textContent = discount.toFixed(2);
                document.getElementById("discount-display").style.display = "block";
            } else {
                document.getElementById("discount-display").style.display = "none";
            }

            totalElement.textContent = calcFinalTotal().toFixed(2);
            saveCart();
        }

        // --- PROMO CODE ---
        document.getElementById("apply-promo-btn").addEventListener("click", async () => {
            const codeInput = document.getElementById("promoCode");
            const code = codeInput.value.trim().toUpperCase();
            const msg = document.getElementById("promo-message");
            const btn = document.getElementById("apply-promo-btn");

            if (!code) return;

            // Reset message state before new attempt
            msg.style.display = "none";
            msg.textContent = "";
            btn.disabled = true;
            btn.textContent = "...";

            try {
                const response = await fetch(`${BACKEND_URL}/validate-promo`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ code })
                });

                const data = await response.json();

                if (response.ok && data.valid) {
                    appliedPromo = { code, type: data.type, value: data.value };
                    msg.textContent = `✓ Code "${code}" applied.`;
                    msg.style.color = "#4CAF50";
                    msg.style.display = "block";
                    renderCart();
                } else {
                    throw new Error(data.message || "Invalid promo code.");
                }
            } catch (err) {
                appliedPromo = null;
                msg.textContent = err.message;
                msg.style.color = "#d9534f";
                msg.style.display = "block";
                renderCart();
            } finally {
                btn.disabled = false;
                btn.textContent = "Apply";
            }
        });

        function changeQty(index, delta) {
            cart[index].quantity += delta;
            if (cart[index].quantity <= 0) cart.splice(index, 1);
            renderCart();
        }

        function removeItem(index) {
            cart.splice(index, 1);
            renderCart();
        }

        function showError(msg) {
            const errorBox = document.getElementById("error-box");
            errorBox.textContent = msg;
            errorBox.style.display = "block";
            window.scrollTo(0, 0);
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        document.getElementById("pay-btn").addEventListener("click", async () => {
            const btn = document.getElementById("pay-btn");
            const name = document.getElementById("customerName").value.trim();
            const email = document.getElementById("customer-email").value.trim();
            const errorBox = document.getElementById("error-box");

            errorBox.style.display = "none";

            if (!name) {
                showError("Please enter your full name.");
                return;
            }

            if (!email || !isValidEmail(email)) {
                showError("Please enter a valid email address.");
                return;
            }

            if (cart.length === 0) {
                showError("Your cart is empty.");
                return;
            }

            const finalTotal = calcFinalTotal();

            if (finalTotal < 1.00) {
                showError("Minimum order amount is £1.00.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span>Processing...';

            try {
                const response = await fetch(`${BACKEND_URL}/create-checkout`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        // Send as a number, not a string — backend validates typeof amount === "number"
                        amount: parseFloat(finalTotal.toFixed(2)),
                        email
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Server error. Please try again.");
                }

                // Backend returns checkoutUrl — redirect to SumUp hosted page
                if (data.checkoutUrl) {
                    window.location.href = data.checkoutUrl;
                } else {
                    throw new Error("No payment URL received. Please try again.");
                }

            } catch (err) {
                console.error("Checkout error:", err);
                showError(`Checkout failed: ${err.message}`);
                btn.disabled = false;
                btn.textContent = "Pay Securely with SumUp";
            }
        });

        renderCart();
    </script>
</body>
</html>
